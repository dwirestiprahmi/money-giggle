spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/money-giggle}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
    expiration-ms: ${JWT_EXPIRATION:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  currency:
    api-url: https://api.exchangerate-api.com/v4/latest
    cache-ttl-minutes: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8081}

logging:
  level:
    com.money.giggle: DEBUG
    org.springframework.security: INFO
